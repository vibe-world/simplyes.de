<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SIMPLYES - Contact Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "on-error": "#ffffff",
          "surface-container-high": "#e6e9e8",
          "outline": "#737a67",
          "tertiary": "#9b3684",
          "inverse-on-surface": "#eff1f0",
          "primary-container": "#8bc34a",
          "on-primary-fixed-variant": "#2e4f00",
          "surface-bright": "#f8faf9",
          "primary": "#3e6a00",
          "on-secondary-fixed": "#00201c",
          "tertiary-fixed": "#ffd7ee",
          "on-tertiary-fixed": "#3a0030",
          "surface-container-highest": "#e1e3e2",
          "error": "#ba1a1a",
          "surface-container-lowest": "#ffffff",
          "secondary-container": "#85f6e5",
          "on-surface": "#191c1c",
          "surface-dim": "#d8dada",
          "on-error-container": "#93000a",
          "background": "#f8faf9",
          "on-background": "#191c1c",
          "inverse-surface": "#2e3131",
          "surface-variant": "#e1e3e2",
          "error-container": "#ffdad6",
          "on-secondary": "#ffffff",
          "surface-container-low": "#f2f4f3",
          "tertiary-container": "#ff8bde",
          "on-surface-variant": "#424939",
          "primary-fixed-dim": "#9ed75b",
          "surface-container": "#eceeed",
          "primary-fixed": "#b9f474",
          "secondary-fixed": "#85f6e5",
          "on-primary-container": "#2d4e00",
          "outline-variant": "#c2c9b4",
          "on-primary-fixed": "#0f2000",
          "on-tertiary-fixed-variant": "#7e1b6a",
          "secondary": "#006a60",
          "on-primary": "#ffffff",
          "on-secondary-fixed-variant": "#005048",
          "on-secondary-container": "#007166",
          "on-tertiary": "#ffffff",
          "secondary-fixed-dim": "#67d9c9",
          "on-tertiary-container": "#7c1968",
          "inverse-primary": "#9ed75b",
          "surface": "#f8faf9",
          "tertiary-fixed-dim": "#ffade4",
          "surface-tint": "#3e6a00"
        },
        "borderRadius": {
          "DEFAULT": "0.125rem",
          "lg": "0.25rem",
          "xl": "0.5rem",
          "full": "0.75rem"
        },
        "spacing": {},
        "fontFamily": {
          "headline": ["Manrope"],
          "body": ["Inter"],
          "label": ["Inter"]
        }
      },
    },
  }
</script>
<style>
  /* View Transitions API for modern smooth routing */
  @view-transition { navigation: auto; }
  /* Fallback fade-in for older browsers */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  body {
    min-height: max(884px, 100dvh);
    animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
</style>
</head>
<body class="bg-surface text-on-surface font-body antialiased flex flex-col min-h-screen overflow-x-hidden">

<div id="site-header"></div>

<!-- Main Canvas -->
<main class="flex-grow px-6 pt-8 pb-32 max-w-lg mx-auto w-full flex flex-col gap-12">
  <!-- Hero Editorial Header -->
  <section class="flex flex-col gap-4">
    <h1 class="font-headline text-[3.5rem] leading-none tracking-[-0.02em] text-on-surface font-extrabold pr-8">
      Let's <br/> Connect.
    </h1>
    <p class="font-body text-on-surface-variant max-w-[280px]">
      Reach out for inquiries, partnerships, or just to say hello. We are here to listen.
    </p>
  </section>

  <!-- Contact Form -->
  <section class="bg-surface-container-lowest rounded-xl p-6 relative">
    <div class="absolute inset-0 bg-gradient-to-br from-[#3e6a00]/5 to-[#8bc34a]/5 rounded-xl pointer-events-none"></div>
    <form id="contact-form" action="#" class="flex flex-col gap-6 relative z-10">
      <div class="flex flex-col gap-2">
        <label class="font-label text-sm text-on-surface-variant font-medium" for="name">Full Name</label>
        <input class="bg-surface-container-highest border-0 border-b outline-variant/15 text-on-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 rounded-md py-3 px-4 transition-colors font-body" id="name" name="name" placeholder="Jane Doe" type="text"/>
      </div>
      <div class="flex flex-col gap-2">
        <label class="font-label text-sm text-on-surface-variant font-medium" for="email">Email Address</label>
        <input class="bg-surface-container-highest border-0 border-b outline-variant/15 text-on-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 rounded-md py-3 px-4 transition-colors font-body" id="email" name="email" placeholder="jane@example.com" type="email"/>
      </div>
      <div class="flex flex-col gap-2">
        <label class="font-label text-sm text-on-surface-variant font-medium" for="message">Message</label>
        <textarea class="bg-surface-container-highest border-0 border-b outline-variant/15 text-on-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 rounded-md py-3 px-4 transition-colors font-body resize-none" id="message" name="message" placeholder="How can we help you?" rows="4"></textarea>
      </div>
      <button class="mt-4 bg-gradient-to-br from-[#3e6a00] to-[#8bc34a] text-on-primary rounded-full py-4 px-8 font-label font-medium text-center w-full shadow-[0px_12px_32px_rgba(25,28,28,0.04)] active:scale-95 transition-transform duration-200" type="submit">
        Send Message
      </button>
    </form>
  </section>

  <!-- Global Presence -->
  <section class="flex flex-col gap-6">
    <h2 class="font-headline text-2xl font-bold text-on-surface">Global Presence</h2>
    <div class="bg-surface-container-low rounded-xl p-2 flex flex-col gap-4">
      <button type="button" class="w-full text-left bg-surface-container-lowest rounded-lg p-5 flex justify-between items-center group cursor-pointer">
        <div class="flex flex-col">
          <span class="font-headline font-bold text-lg text-on-surface">London</span>
          <span class="font-body text-sm text-on-surface-variant">UK Headquarters</span>
        </div>
        <span class="material-symbols-outlined text-secondary transition-transform group-active:translate-x-1">arrow_forward</span>
      </button>
      <button type="button" class="w-full text-left bg-surface-container-lowest rounded-lg p-5 flex justify-between items-center group cursor-pointer">
        <div class="flex flex-col">
          <span class="font-headline font-bold text-lg text-on-surface">New York</span>
          <span class="font-body text-sm text-on-surface-variant">Americas Hub</span>
        </div>
        <span class="material-symbols-outlined text-secondary transition-transform group-active:translate-x-1">arrow_forward</span>
      </button>
      <button type="button" class="w-full text-left bg-surface-container-lowest rounded-lg p-5 flex justify-between items-center group cursor-pointer">
        <div class="flex flex-col">
          <span class="font-headline font-bold text-lg text-on-surface">Dubai</span>
          <span class="font-body text-sm text-on-surface-variant">MENA Office</span>
        </div>
        <span class="material-symbols-outlined text-secondary transition-transform group-active:translate-x-1">arrow_forward</span>
      </button>
    </div>
  </section>
</main>

<div id="site-nav"></div>
<script src="components.js"></script>
</body>
</html>
