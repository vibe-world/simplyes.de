<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8faf9;
            color: #191c1c;
        }
        h1, h2, h3, h4, h5, h6, .headline {
            font-family: 'Manrope', sans-serif;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 bg-zinc-50 dark:bg-zinc-800/50 shadow-sm dark:shadow-none hidden md:flex flex flex-between items-center px-6 py-4 max-w-7xl mx-auto">
<div class="flex justify-between w-full items-center">
<button aria-label="Menu" class="text-zinc-500 dark:text-zinc-400 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="menu">menu</span>
</button>
<div class="font-['Manrope'] font-bold tracking-tight text-2xl font-black text-lime-600 dark:text-lime-400 tracking-tighter">
                SIMPLYES
            </div>
<button aria-label="User Profile" class="text-zinc-500 dark:text-zinc-400 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Mobile Top Header (Fallback for when md is hidden) -->
<header class="md:hidden flex justify-between items-center px-6 py-4 bg-white/80 backdrop-blur-xl sticky top-0 z-50">
<div class="font-['Manrope'] font-bold tracking-tight text-2xl font-black text-lime-600 tracking-tighter">
                SIMPLYES
            </div>
</header>
<!-- Main Canvas -->
<main class="flex-grow px-6 pt-8 pb-32 max-w-lg mx-auto w-full flex flex-col gap-12">
<!-- Hero Editorial Header -->
<section class="flex flex-col gap-4">
<h1 class="headline text-[3.5rem] leading-none tracking-[-0.02em] text-on-surface font-extrabold pr-8">
                Let's <br/> Connect.
            </h1>
<p class="font-body text-body-lg text-on-surface-variant max-w-[280px]">
                Reach out for inquiries, partnerships, or just to say hello. We are here to listen.
            </p>
</section>
<!-- Contact Form (Glassmorphism inspired) -->
<section class="bg-surface-container-lowest rounded-xl p-6 relative">
<div class="absolute inset-0 bg-gradient-to-br from-[#3e6a00]/5 to-[#8bc34a]/5 rounded-xl pointer-events-none"></div>
<form class="flex flex-col gap-6 relative z-10">
<div class="flex flex-col gap-2">
<label class="font-label text-sm text-on-surface-variant font-medium" for="name">Full Name</label>
<input class="bg-surface-container-highest border-0 border-b outline-variant/15 text-on-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 rounded-md py-3 px-4 transition-colors font-body" id="name" name="name" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-sm text-on-surface-variant font-medium" for="email">Email Address</label>
<input class="bg-surface-container-highest border-0 border-b outline-variant/15 text-on-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 rounded-md py-3 px-4 transition-colors font-body" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-sm text-on-surface-variant font-medium" for="message">Message</label>
<textarea class="bg-surface-container-highest border-0 border-b outline-variant/15 text-on-surface focus:bg-surface-container-lowest focus:border-primary focus:ring-0 rounded-md py-3 px-4 transition-colors font-body resize-none" id="message" name="message" placeholder="How can we help you?" rows="4"></textarea>
</div>
<button class="mt-4 bg-gradient-to-br from-[#3e6a00] to-[#8bc34a] text-on-primary rounded-full py-4 px-8 font-label font-medium text-center w-full shadow-[0px_12px_32px_rgba(25,28,28,0.04)] active:scale-95 transition-transform duration-200" type="submit">
                    Send Message
                </button>
</form>
</section>
<!-- Global Presence (Minimalist List) -->
<section class="flex flex-col gap-6">
<h2 class="headline text-2xl font-bold text-on-surface">Global Presence</h2>
<div class="bg-surface-container-low rounded-xl p-2 flex flex-col gap-4">
<!-- London Item -->
<div class="bg-surface-container-lowest rounded-lg p-5 flex justify-between items-center group cursor-pointer">
<div class="flex flex-col">
<span class="headline font-bold text-lg text-on-surface">London</span>
<span class="font-body text-sm text-on-surface-variant">UK Headquarters</span>
</div>
<span class="material-symbols-outlined text-secondary transition-transform group-active:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</div>
<!-- New York Item -->
<div class="bg-surface-container-lowest rounded-lg p-5 flex justify-between items-center group cursor-pointer">
<div class="flex flex-col">
<span class="headline font-bold text-lg text-on-surface">New York</span>
<span class="font-body text-sm text-on-surface-variant">Americas Hub</span>
</div>
<span class="material-symbols-outlined text-secondary transition-transform group-active:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</div>
<!-- Dubai Item -->
<div class="bg-surface-container-lowest rounded-lg p-5 flex justify-between items-center group cursor-pointer">
<div class="flex flex-col">
<span class="headline font-bold text-lg text-on-surface">Dubai</span>
<span class="font-body text-sm text-on-surface-variant">MENA Office</span>
</div>
<span class="material-symbols-outlined text-secondary transition-transform group-active:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl shadow-[0_-4px_20px_rgba(0,0,0,0.03)] pb-safe">
<div class="fixed bottom-0 w-full flex justify-around items-center px-4 py-3 pb-safe border-t border-zinc-100 dark:border-zinc-800">
<!-- Home (Inactive) -->
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-teal-600 dark:hover:text-teal-400 transition-all cubic-bezier(0.4, 0, 0.2, 1) w-16" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="home">home</span>
<span class="font-['Manrope'] text-[10px] font-medium uppercase tracking-widest">Home</span>
</a>
<!-- Services (Inactive) -->
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-teal-600 dark:hover:text-teal-400 transition-all cubic-bezier(0.4, 0, 0.2, 1) w-16" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="settings_suggest">settings_suggest</span>
<span class="font-['Manrope'] text-[10px] font-medium uppercase tracking-widest">Services</span>
</a>
<!-- Contact (Active) -->
<a class="flex flex-col items-center justify-center bg-lime-100 dark:bg-lime-900/30 text-lime-800 dark:text-lime-200 rounded-full px-6 py-1.5 transition-all cubic-bezier(0.4, 0, 0.2, 1) w-auto" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="chat_bubble" data-weight="fill" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-['Manrope'] text-[10px] font-medium uppercase tracking-widest">Contact</span>
</a>
</div>
</nav>
